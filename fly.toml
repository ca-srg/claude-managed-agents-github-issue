# Fly.io configuration for gh-issue-agent.
#
# See docs/deploy-fly.md for the full setup walkthrough (volumes, secrets).

app = 'gh-issue-agent'
primary_region = 'nrt'

[build]

[env]
  HOST = '0.0.0.0'
  PORT = '3000'
  LOG_LEVEL = 'info'
  DB_PATH = '/data/dashboard.db'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1gb'
  auto_extend_size_limit = '10gb'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[deploy]
  strategy = 'immediate'

[[restart]]
  policy = 'always'

[checks]
  [checks.tcp-3000]
    port = 3000
    type = 'tcp'
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
